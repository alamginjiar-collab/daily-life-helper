<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCompanion — Your Zen Space</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FFF6DE; 
            color: #4A4A4A;
        }
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .habit-card:hover { transform: translateY(-2px); transition: all 0.3s ease; }
        .mic-animate { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(248, 145, 187, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(248, 145, 187, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 145, 187, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isListening, setIsListening] = useState(false);
            const [habits, setHabits] = useState([
                { id: 1, title: "Morning Meditation", done: true, color: "#E0F2F1" },
                { id: 2, title: "Drink 2L Water", done: false, color: "#E1F5FE" },
                { id: 3, title: "Read 10 Pages", done: false, color: "#F3E5F5" }
            ]);
            const [aiSuggestion, setAiSuggestion] = useState("Good morning, Sunshine! How about a quick stretch to start the day?");

            const toggleHabit = (id) => {
                setHabits(habits.map(h => h.id === id ? {...h, done: !h.done} : h));
                setAiSuggestion("You're doing amazing! Keep that momentum going. ✨");
            };

            const handleVoiceClick = () => {
                setIsListening(!isListening);
                // Logic for Gemini Live API would go here
                if(!isListening) {
                    setTimeout(() => {
                        setIsListening(false);
                        setAiSuggestion("I've added 'Evening Walk' to your habits. Relax and enjoy!");
                    }, 3000);
                }
            };

            return (
                <div className="min-h-screen p-6 md:p-12 max-w-2xl mx-auto">
                    {/* Header */}
                    <header className="mb-10 mt-8">
                        <h1 className="text-4xl font-semibold text-gray-800 mb-2">VibeCompanion</h1>
                        <div className="glass rounded-3xl p-6 mt-6 flex items-start gap-4">
                            <div className="text-2xl">✨</div>
                            <p className="text-gray-600 italic leading-relaxed">"{aiSuggestion}"</p>
                        </div>
                    </header>

                    {/* Progress Section */}
                    <section className="mb-10">
                        <div className="flex justify-between items-end mb-4">
                            <h2 className="text-xl font-medium">Weekly Progress</h2>
                            <span className="text-[#F891BB] font-semibold">75%</span>
                        </div>
                        <div className="h-3 w-full bg-white/50 rounded-full overflow-hidden">
                            <div className="h-full bg-[#F891BB] rounded-full" style={{width: '75%'}}></div>
                        </div>
                    </section>

                    {/* Habit List */}
                    <section className="space-y-4">
                        {habits.map(habit => (
                            <div 
                                key={habit.id}
                                onClick={() => toggleHabit(habit.id)}
                                className="glass habit-card p-5 rounded-[2rem] flex items-center justify-between cursor-pointer transition-all"
                            >
                                <div className="flex items-center gap-4">
                                    <div 
                                        className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${habit.done ? 'bg-[#F891BB] border-[#F891BB]' : 'border-gray-300'}`}
                                    >
                                        {habit.done && <span className="text-white text-xs">✓</span>}
                                    </div>
                                    <span className={`text-lg ${habit.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>
                                        {habit.title}
                                    </span>
                                </div>
                                <div className="w-10 h-10 rounded-2xl opacity-50" style={{backgroundColor: habit.color}}></div>
                            </div>
                        ))}
                    </section>

                    {/* Action Buttons */}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-6">
                        {/* Image Upload */}
                        <label className="glass w-14 h-14 rounded-full flex items-center justify-center cursor-pointer hover:bg-white/60 transition-all">
                            <input type="file" className="hidden" accept="image/*" onChange={() => setAiSuggestion("Analyzing your photo... Looks like a healthy meal! Logged. 🥗")} />
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        </label>

                        {/* Voice Assistant Button */}
                        <button 
                            onClick={handleVoiceClick}
                            className={`w-20 h-20 rounded-full flex items-center justify-center transition-all shadow-lg ${isListening ? 'bg-[#F891BB] mic-animate text-white' : 'bg-white text-[#F891BB]'}`}
                        >
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>

                        {/* Add Manual */}
                        <button className="glass w-14 h-14 rounded-full flex items-center justify-center hover:bg-white/60 transition-all">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
